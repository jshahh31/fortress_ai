version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fortress
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  qwen-service:
    image: vllm/vllm-openai-rocm:latest
    container_name: qwen-3.6-27b
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_TARGET_DEVICE=rocm
      - PYTORCH_ALLOC_CONF=expandable_segments:True
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    security_opt:
      - seccomp:unconfined
    group_add:
      - "44"
      - "992"
    shm_size: '8gb'
    cap_add:
      - SYS_PTRACE
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8001:8000"
    ipc: host
    command:
      - "Qwen/Qwen3.6-27B"
      - "--trust-remote-code"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--max-model-len"
      - "131072"

  qdrant-db:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/fortress?schema=public
      REDIS_URL: redis://redis:6379/0
      QWEN_API_BASE: http://qwen-service:8000/v1
      QDRANT_URL: http://qdrant-db:6333
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  celery-worker:
    build: .
    command: celery -A app.worker.celery_app worker --concurrency=1 --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/fortress?schema=public
      REDIS_URL: redis://redis:6379/0
      QWEN_API_BASE: http://qwen-service:8000/v1
      QDRANT_URL: http://qdrant-db:6333
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
    volumes:
      - ./app:/app/app
    restart: on-failure

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://129.212.191.242:8080
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
