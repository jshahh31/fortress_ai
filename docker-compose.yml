version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: fortress
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  vllm-qwen:
    image: rocm/vllm:rocm6.0_ubuntu20.04_py3.9_vllm0.3.0 # Update with latest compatible ROCm 7.x image tag when available
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: --model Qwen/Qwen2.5-32B-Instruct --port 8000 --tensor-parallel-size 2
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    ipc: host

  vllm-gemma:
    image: rocm/vllm:rocm6.0_ubuntu20.04_py3.9_vllm0.3.0 # Update with latest compatible ROCm 7.x image tag when available
    ports:
      - "8001:8000"
    env_file:
      - .env
    command: --model google/gemma-2-2b-it --port 8000 --tensor-parallel-size 1
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    ipc: host

  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override localhost URLs with Docker service hostnames
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/fortress?schema=public
      REDIS_URL: redis://redis:6379/0
      # Route local SSH tunnels through host.docker.internal
      QWEN_API_BASE: http://host.docker.internal:8001/v1
      GEMMA_API_BASE: http://host.docker.internal:8002/v1
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  celery-worker:
    build: .
    command: celery -A app.worker.celery_app worker --concurrency=1 --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/fortress?schema=public
      REDIS_URL: redis://redis:6379/0
      QWEN_API_BASE: http://host.docker.internal:8001/v1
      GEMMA_API_BASE: http://host.docker.internal:8002/v1
      QDRANT_URL: http://qdrant:6333
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_started
    volumes:
      - ./app:/app/app
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
